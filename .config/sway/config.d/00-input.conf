# Keyboard: Brazilian ABNT2 layout (ThinkPad variant)
input type:keyboard {
    xkb_layout br
    xkb_variant thinkpad
    xkb_options grp:alt_shift_toggle,caps:swapescape
}

# White cursor with contrast
seat * xcursor_theme DMZ-White 24

# Touchpad: tap-to-click and natural scroll
input type:touchpad {
    tap enabled
    natural_scroll enabled
    dwt enabled
}
