# Resize mode (sobrescreve o modo padrão do Fedora — adiciona controle de gaps)
unbindsym $mod+r
set $mode_resize "resize: arrow=10px  shift+arrow=50px  +/- gaps"
mode $mode_resize {
    bindsym Left  resize shrink width  10px
    bindsym Down  resize grow   height 10px
    bindsym Up    resize shrink height 10px
    bindsym Right resize grow   width  10px

    bindsym Shift+Left  resize shrink width  50px
    bindsym Shift+Down  resize grow   height 50px
    bindsym Shift+Up    resize shrink height 50px
    bindsym Shift+Right resize grow   width  50px

    bindsym minus gaps inner current minus 5
    bindsym plus  gaps inner current plus  5

    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode $mode_resize

# Scratchpad (já existe no Fedora com os mesmos comandos — silencia o warning)
unbindsym $mod+Shift+minus
unbindsym $mod+minus
bindsym $mod+Shift+minus move scratchpad
bindsym $mod+minus       scratchpad show

# Navegação
bindsym $mod+Tab       workspace back_and_forth
bindsym Mod1+Tab       exec ~/.local/bin/sway-alt-tab next
bindsym Mod1+Shift+Tab exec ~/.local/bin/sway-alt-tab prev

# Primeiro workspace vazio
bindsym $mod+n exec ~/.local/bin/first-empty-workspace

# Waybar toggle
bindsym $mod+Shift+b exec pkill -U $USER -x -SIGUSR1 waybar

# Clipboard (cliphist + fzf)
bindsym $mod+Shift+p exec ~/.local/bin/clipboard

# Do-not-disturb (dunst)
bindsym $mod+Shift+d exec dunstctl set-paused toggle

# Touchpad toggle (Fedora nao tem isso)
bindsym XF86TouchpadToggle input type:touchpad events toggle enabled disabled
