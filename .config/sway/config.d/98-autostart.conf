# Clipboard history (requires cliphist + wl-clipboard)
exec wl-paste --watch cliphist store

# Auto-split in the longest direction (requires autotiling)
exec autotiling

# Night mode: reduce color temperature after sunset (requires wlsunset)
# -T: daytime temp (K)  -t: nighttime (K)  -S: sunrise  -s: sunset
exec wlsunset -T 6500 -t 4000 -S 06:30 -s 18:30
