# Historico de clipboard (requer cliphist + wl-clipboard)
exec wl-paste --watch cliphist store


# Split automatico na direcao mais longa do container (requer autotiling)
exec autotiling

# Night mode: reduz temperatura de cor apos o por do sol (requer wlsunset)
# -T: temperatura diurna (K)  -t: noturna (K)  -S: amanhecer  -s: anoitecer
exec wlsunset -T 6500 -t 4000 -S 06:30 -s 18:30
