# Prefix: Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Cores 24-bit
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"

# Indexar a partir de 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Mouse + clipboard
set -g mouse on
set -g set-clipboard on
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi y                send-keys -X copy-pipe-and-cancel "wl-copy"

# Sem delay no Escape
set -sg escape-time 0

# Histórico
set -g history-limit 10000

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegar com Alt+seta
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Recarregar
bind r source-file ~/.tmux.conf \; display "reloaded"

# Status bar — monochromatic
set -g status-position bottom
set -g status-style "bg=#0a0a0a,fg=#71717a"
set -g status-left "#[fg=#e4e4e7,bold] #S #[fg=#27272a]│ "
set -g status-left-length 30
set -g status-right "#[fg=#3f3f46]%d/%m #[fg=#71717a] %H:%M "
set -g status-right-length 30

# Janelas
set -g window-status-current-style "fg=#e4e4e7,bold"
set -g window-status-current-format " #I #W "
set -g window-status-format " #I #W "
set -g window-status-style "fg=#3f3f46"

# Painéis
set -g pane-border-style "fg=#18181b"
set -g pane-active-border-style "fg=#27272a"

# Mensagens
set -g message-style "bg=#111111,fg=#e4e4e7"
